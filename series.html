<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Archive | Mizumi Sonozawa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #1a1a1a; 
            color: #fff; 
            margin: 0;
            padding: 40px;
            /* P5 Style Diagonal Stripes */
            background-image: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #222 10px, #222 20px);
        }

        .back-link {
            font-family: "WDXL Lubrifont JP N", sans-serif;
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 30px;
            border: 3px solid #d32f2f;
            padding: 10px 20px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .back-link:hover {
            background: #d32f2f;
            color: #fff;
            transform: scale(1.1) rotate(-2deg);
        }

        h1 { 
            font-family: "WDXL Lubrifont JP N", sans-serif; 
            font-size: 50px; 
            background: #d32f2f; 
            display: inline-block; 
            padding: 15px 40px;
            transform: rotate(-3deg);
            box-shadow: 10px 10px 0px #000;
            margin-bottom: 50px;
        }

        .content-area {
            max-width: 800px;
        }

        .volume-card {
            background: #fff;
            color: #000;
            margin: 20px 0;
            padding: 25px;
            border: 5px solid #000;
            transform: rotate(1deg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .volume-card:nth-child(even) {
            transform: rotate(-1.5deg);
            background: #000;
            color: #fff;
            border-color: #d32f2f;
        }

        .volume-title {
            font-family: "WDXL Lubrifont JP N", sans-serif;
            font-size: 24px;
            text-transform: uppercase;
        }

        .status-tag {
            background: #d32f2f;
            color: #fff;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">< RETURN_TO_MAIN</a>
    
    <br>
    
    <h1>SERIES_DATABASE</h1>

    <div class="content-area">
        <div class="volume-card">
            <span class="volume-title">Volume 01: The First Arc</span>
            <span class="status-tag">COMPLETED</span>
        </div>

        <div class="volume-card">
            <span class="volume-title">Volume 02: Hidden Depths</span>
            <span class="status-tag">IN PROGRESS</span>
        </div>

        <div class="volume-card">
            <span class="volume-title">Volume 03: Future Lore</span>
            <span class="status-tag">LOCKED</span>
        </div>
    </div>

</body>
</html>
