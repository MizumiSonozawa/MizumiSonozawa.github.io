<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizumi Sonozawa's | Work Collection!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f4f4; 
            color: #333;
        }

        header { 
            text-align: center; 
            padding: 60px 20px; 
            background: #333; 
            color: #fff; 
            border-radius: 8px; 
            margin-bottom: 30px;
        }

        h1 {
            font-family: "WDXL Lubrifont JP N", sans-serif;
            font-size: 55px; 
            letter-spacing: 3px;
            margin: 0;
        }

        /* Side-by-Side Blueprint Layout */
        .container { 
            max-width: 900px; 
            margin: auto; 
            display: flex; 
            gap: 20px;    
            justify-content: center;
        }

        .project-card { 
            background: #fff; 
            padding: 50px 20px; 
            border: 2px solid #333; 
            border-radius: 8px; 
            flex: 1; 
            text-align: center;
            min-height: 180px; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers the content vertically */
            align-items: center;    /* Centers the content horizontally */
        }

        h2 { 
            color: #333; 
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 25px; /* Adds space between heading and button */
        }

        .link-btn { 
            display: inline-block; 
            background: #007bff; 
            color: white; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
            transition: background 0.3s;
        }

        .link-btn:hover {
            background: #0056b3;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mizumi Sonozawa</h1>
        <p>A collection of my works and projects.</p>
    </header>

    <div class="container">
        <section class="project-card">
            <h2>Read the series</h2>
            <a href="#" class="link-btn">Open Archive</a>
        </section>

        <section class="project-card">
            <h2>Lore</h2>
            <a href="#" class="link-btn">Explore Lore</a>
        </section>
    </div>

</body>
</html>
