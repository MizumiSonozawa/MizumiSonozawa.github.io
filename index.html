<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizumi Sonozawa | Archive</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #1a1a1a; 
            color: #fff;
            background-image: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #222 10px, #222 20px);
        }

        header { 
            text-align: center; 
            padding: 60px 20px; 
            background: #d32f2f; 
            color: #fff; 
            transform: skewY(-2deg);
            margin-bottom: 50px;
            box-shadow: 10px 10px 0px #000;
        }

        h1 {
            font-family: "WDXL Lubrifont JP N", sans-serif;
            font-size: 60px; 
            letter-spacing: -2px; 
            margin: 0;
            text-transform: uppercase;
            transform: skewY(2deg); 
            text-shadow: 4px 4px 0px #000;
        }

        .container { 
            max-width: 950px; 
            margin: auto; 
            display: flex; 
            gap: 30px;    
            justify-content: center;
        }

        .project-card { 
            background: #fff; 
            padding: 50px 20px; 
            border: 5px solid #000; 
            flex: 1; 
            text-align: center;
            transform: rotate(-1.5deg);
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .project-card:last-child {
            transform: rotate(1.5deg);
            background: #000;
            border-color: #d32f2f;
        }

        .project-card:last-child h2 { color: #fff; }

        h2 { 
            color: #000; 
            font-family: "WDXL Lubrifont JP N", sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .link-btn { 
            display: inline-block; 
            background: #000; 
            color: #fff; 
            padding: 15px 30px; 
            text-decoration: none; 
            font-weight: bold;
            font-family: "WDXL Lubrifont JP N", sans-serif;
            border: none;
            transition: 0.2s;
        }

        .link-btn:hover {
            background: #d32f2f;
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 5px 5px 0px #fff;
        }

        .project-card:last-child .link-btn { background: #d32f2f; }
        .project-card:last-child .link-btn:hover { background: #fff; color: #000; }

        @media (max-width: 600px) { .container { flex-direction: column; } }
    </style>
</head>
<body>

    <header>
        <h1>Mizumi Sonozawa</h1>
        <p style="font-weight: bold; letter-spacing: 2px; text-transform: uppercase;">Works & Personal Archive</p>
    </header>

    <div class="container">
        <section class="project-card">
            <h2>Read the series</h2>
            <a href="series.html" class="link-btn">ENTER ></a>
        </section>

        <section class="project-card">
            <h2>Lore</h2>
            <a href="lore.html" class="link-btn">VIEW DATA ></a>
        </section>
    </div>

</body>
</html>
