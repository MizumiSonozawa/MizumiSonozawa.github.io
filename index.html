<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizumi Sonozawa's | Work Collection!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">

    <style>
        /* General Page Settings */
        body { 
            font-family: sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f4f4; 
            color: #333;
        }

        /* Header section (No changes needed) */
        header { 
            text-align: center; 
            padding: 60px 20px; 
            background: #333; 
            color: #fff; 
            border-radius: 8px; 
            margin-bottom: 30px;
        }

        h1 {
            font-family: "WDXL Lubrifont JP N", sans-serif;
            font-size: 55px; 
            letter-spacing: 3px;
            margin: 0;
        }

        /* THE BLUEPRINT LAYOUT FIX: Side-by-Side Boxes */
        .container { 
            max-width: 900px; 
            margin: auto; 
            display: flex; /* This makes children sit side-by-side */
            gap: 20px;    /* This creates the space between the boxes */
            justify-content: center;
        }

        .project-card { 
            background: #fff; 
            padding: 40px 20px; 
            border: 2px solid #333; /* Matches your square blueprint look */
            border-radius: 8px; 
            flex: 1; /* Makes both boxes the same width */
            text-align: center;
            min-height: 200px; /* Gives them that square-ish shape */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h2 { 
            color: #333; 
            font-size: 24px;
            margin-top: 0;
        }

        .link-btn { 
            display: inline-block; 
            background: #007bff; 
            color: white; 
            padding: 10px 15px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
        }

        /* Responsive: Stack them on top of each other on phones */
        @media (max-width: 600px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mizumi Sonozawa</h1>
        <p>A collection of my works and projects.</p>
    </header>

    <div class="container">
        <section class="project-card">
            <h2>Read the series</h2>
            <p>Dive into the latest chapters of my stories.</p>
            <a href="#" class="link-btn">Open Archive</a>
        </section>

        <section class="project-card">
            <h2>Lore</h2>
            <p>Explore the world-building, maps, and history.</p>
            <a href="#" class="link-btn">Explore Lore</a>
        </section>
    </div>

</body>
</html>
